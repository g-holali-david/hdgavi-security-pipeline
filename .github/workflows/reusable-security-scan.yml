name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      docker-context:
        description: "Path to Docker build context"
        required: false
        type: string
        default: "."
      terraform-dir:
        description: "Path to Terraform directory"
        required: false
        type: string
        default: ""
      scan-docker:
        description: "Enable Docker image scanning"
        required: false
        type: boolean
        default: true
      scan-iac:
        description: "Enable IaC scanning"
        required: false
        type: boolean
        default: true
    outputs:
      security-score:
        description: "Security score (0-100)"
        value: ${{ jobs.report.outputs.score }}
      policy-passed:
        description: "Whether all policies passed"
        value: ${{ jobs.report.outputs.passed }}

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: "Trivy Scan"
    runs-on: ubuntu-latest
    if: inputs.scan-docker
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t scan-target:${{ github.sha }} ${{ inputs.docker-context }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "scan-target:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

  gitleaks:
    name: "Gitleaks Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: detect --source=/github/workspace --report-format=sarif --report-path=/github/workspace/gitleaks-results.sarif --exit-code=0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif

  checkov:
    name: "Checkov Scan"
    runs-on: ubuntu-latest
    if: inputs.scan-iac && inputs.terraform-dir != ''
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.terraform-dir }}
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.sarif

  grype:
    name: "Grype Scan"
    runs-on: ubuntu-latest
    if: inputs.scan-docker
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t scan-target:${{ github.sha }} ${{ inputs.docker-context }}
      - uses: anchore/sbom-action@v0
        with:
          image: "scan-target:${{ github.sha }}"
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: anchore/scan-action@v5
        id: grype
        with:
          sbom: sbom.spdx.json
          fail-build: false
          output-format: sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-results
          path: ${{ steps.grype.outputs.sarif }}

  report:
    name: "Generate Report"
    runs-on: ubuntu-latest
    needs: [trivy, gitleaks, checkov, grype]
    if: always()
    outputs:
      score: ${{ steps.gen.outputs.score }}
      passed: ${{ steps.gen.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: scan-results
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jinja2
      - name: Generate report
        id: gen
        run: |
          python scripts/report_generator.py \
            --trivy-sarif scan-results/trivy-results/trivy-results.sarif \
            --gitleaks-sarif scan-results/gitleaks-results/gitleaks-results.sarif \
            --checkov-sarif scan-results/checkov-results/checkov-results.sarif \
            --grype-sarif scan-results/grype-results/results.sarif \
            --output report/security-report.html || true
          if [ -f report/summary.json ]; then
            echo "score=$(python -c "import json; print(json.load(open('report/summary.json'))['score'])")" >> "$GITHUB_OUTPUT"
          fi
          if [ -f policy-result.json ]; then
            echo "passed=$(python -c "import json; print(str(json.load(open('policy-result.json'))['passed']).lower())")" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report/
